# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      e2e_engine:
        description: 'E2E engine (amis, flux)'
        required: false
        default: ''
      base_url:
        description: 'Base URL for E2E tests (overrides Playwright webServer)'
        required: false
        default: ''
      frontend_dev_mode:
        description: 'Use frontend dev mode (true/false)'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml

  e2e:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build e2e backend modules
      run: mvn -B package -DskipTests -pl nop-auth/nop-auth-app,nop-code/nop-code-app,nop-job/nop-job-app -am --file pom.xml
    - uses: pnpm/action-setup@v4
      with:
        version: 10
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
        cache-dependency-path: nop-entropy-e2e/pnpm-lock.yaml
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      working-directory: nop-entropy-e2e
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
      working-directory: nop-entropy-e2e
    - name: Run E2E tests
      run: pnpm test
      working-directory: nop-entropy-e2e
      env:
        CI: true
        E2E_ENGINE: ${{ github.event.inputs.e2e_engine || '' }}
        BASE_URL: ${{ github.event.inputs.base_url || '' }}
        FRONTEND_DEV_MODE: ${{ github.event.inputs.frontend_dev_mode || 'false' }}
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-report
        path: |
          nop-entropy-e2e/packages/*/playwright-report/
          nop-entropy-e2e/packages/*/test-results/
        retention-days: 30
